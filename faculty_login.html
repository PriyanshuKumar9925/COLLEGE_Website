<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Login | SCEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #eef2f8;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-card {
      background: white;
      padding: 35px;
      width: 360px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 { margin-bottom: 20px; color: #0a2540; }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0a2540;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { background: #08305a; }

    a {
      display: block;
      margin-top: 15px;
      text-decoration: none;
      color: #0a2540;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-card">
  <h2>Faculty Login</h2>

  <form id="facultyLoginForm">
    <input type="text" id="faculty_id" placeholder="Faculty ID" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <a href="index.html">← Back to Home</a>
</div>
<script>
document.addEventListener("DOMContentLoaded", function() {

  const form = document.getElementById("facultyLoginForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const faculty_id = document.getElementById("faculty_id").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:3000/faculty-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        faculty_id: faculty_id,
        password: password
      })
    })
    .then(res => res.text())
    .then(data => {
      if (data.includes("Successful")) {
        alert("Faculty Login Successful ✅");
        window.location.href = "index.html";   // redirect page
      } else {
        alert("Invalid Faculty ID or Password ❌");
      }
    })
    .catch(err => {
      alert("Error connecting to server");
    });

  });

});
</script>
</body>
</html>
